<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description"
      content="Contact White Water Rafting Company for inquiries, reservations, and support.">
    <meta name="author" content="Johnson Doubeni">

    <title>Contact Us | White Water Rafting</title>

    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <header>
        <img src="images/logo.png" alt="Rafting Company Logo">

        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>
    <main>

        <!-- CONTACT HEADER -->
        <section class="contact-header">
            <h1>White Water Rafting Company</h1>
            <p>123 Main River Street</p>
            <p>Kolob, California</p>
            <p>+1 999 999 9999</p>
            <p>info@whitewater.com</p>
        </section>

        <!-- CONTACT CONTENT -->
        <section class="contact-content">

            <!-- MAP -->
            <div class="map">
                <iframe src="https://www.google.com/maps?q=Kolob,California&output=embed"
                  allowfullscreen loading="lazy">
                </iframe>
            </div>

            <!-- FORM -->
            <form class="contact-form">

                <!-- TEXT INPUT -->
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Placeholder" required>

                <!-- EMAIL INPUT -->
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Placeholder" required>

                <!-- RADIO BUTTONS -->
                <p>Message Purpose</p>

                <input type="radio" id="general" name="purpose" value="general" required>
                <label for="general">General Inquiry</label>

                <input type="radio" id="reservation" name="purpose" value="reservation">
                <label for="reservation">Reservation Question</label>

                <input type="radio" id="suggestion" name="purpose" value="suggestion">
                <label for="suggestion">Website Suggestion</label>

                <!-- TEXTAREA -->
                <label for="message">Message</label>
                <textarea id="message" name="message" placeholder="Type here" required></textarea>

                <!-- CHECKBOX -->
                <input type="checkbox" id="subscribe" name="subscribe">
                <label for="subscribe">Please Subscribe me to the monthly newsletter</label>

                <!-- BUTTON -->
                <button type="submit">Get in Touch!</button>

            </form>

        </section>

        <!-- TEAM SECTION -->
        <section class="team">
            <h2>We Are Here to Serve You</h2>

            <div class="team-grid">

                <figure>
                    <img src="images/profile1.jpg" alt="Employee">
                    <figcaption>Employee Profile</figcaption>
                </figure>

                <figure>
                    <img src="images/profile2.jpg" alt="Employee">
                    <figcaption>Employee Profile</figcaption>
                </figure>

                <figure>
                    <img src="images/profile3.jpg" alt="Employee">
                    <figcaption>Employee Profile</figcaption>
                </figure>

            </div>
        </section>

    </main>

    <footer>
        <p>© 2026 White Water Rafting Co. | Lilly Armenta</p>

        <nav class="socialmedia">
            <a href="#"><img src="images/facebook.png" alt="Facebook Logo"></a>
            <a href="#"><img src="images/twitter.png" alt="Twitter Logo"></a>
            <a href="#"><img src="images/instagram.png" alt="Instagram Logo"></a>
        </nav>
    </footer>
</body>

</html>
